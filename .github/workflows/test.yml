name: Docker Image CI # Actions名称

on: # 执行时机
  push:
    branches:
      - master

jobs:
  build:
    # runs-on 指定 job 任务运行所需要的虚拟机环境(必填字段)
    runs-on: ubuntu-latest
    steps:
      # 拉取代码
      - name: checkout # 步骤名字
        # 使用 action 库 actions/checkout 拉取源码
        uses: actions/checkout@master

      # 安装依赖
      - name: install
        run: npm install

      # 打包
      - name: build project
        run: npm run build

      # 登录阿里云镜像容器服务，打包镜像，推送镜像
      - name: Build the Docker image
        run: |
          # 登录阿里云镜像容器服务
          docker login --username=${{ secrets.DOCKER_USERNAME }} registry.cn-wulanchabu.aliyuncs.com --password=${{ secrets.DOCKER_PASSWORD }}
          docker build -t website-serve:latest .
          docker tag website-serve registry.cn-wulanchabu.aliyuncs.com/hhg-website/website-serve:latest
          docker push registry.cn-wulanchabu.aliyuncs.com/hhg-website/website-serve:latest

      # SSH 登录服务器执行脚本
      - name: ssh login
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: d:&& cd /website-serve && echo %cd% && sh website-serve.sh ${{ secrets.DOCKER_USERNAME }} ${{ secrets.DOCKER_PASSWORD }}
      
